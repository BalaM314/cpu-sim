<!DOCTYPE html>
<html lang="en">
<head>
	<!-- Copyright © BalaM314, 2026. MIT License. -->
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CPU Simulator</title>
	<script src="src/cpu.js" type="module"></script>
	<script src="src/assembler/assembler.js" type="module"></script>
	<style>
		:root * {
			font-family: sans-serif;
			box-sizing: border-box;
		}
		html, body {
			width: 100%;
			height: 100%;
			margin: 0px;
			position: absolute;
			background-color: #000;
		}
		body {
			background-image: url("https://balam314.github.io/starfield.png");
		}
		button {
			border-radius: 5px;
			padding: 4px 10px;
			font-size: 130%;
			background-color: #073707;
			color: white;
			border: 3px solid #174717;
		}
		button:disabled {
			cursor: not-allowed;
			background-color: #071407;
			color: gray;
			border: 3px solid #172717;
		}
		button:enabled:hover {
			background-color: #104010;
			border: 3px solid #205020;
		}
		button:enabled:active {
			background-color: #174717;
			border: 3px solid #275527;
		}
		#container {
			padding: 15px 1px;
			background-color: #0026;
			color: whitesmoke;
			font-size: 20px;
			height: 100%;
			display: flex;
			flex-direction: column;
		}
		.padded {
			padding: 0 15px;
		}
		@media screen and (max-width: 600px) {
			#container {
				margin: 0px;
				padding: 15px 1.5vw;
				border-width: 2vw;
				background-color: #0046;
				min-height: calc(100vh - 2 * (15px + 2vw));
			}
		}
		#header {
			text-align: center;
			margin-top: 0;
		}
		footer {
			margin-top: 8px;
			position: sticky;
			top: 100%;
		}
		#textareas {
			flex-grow: 1;
			display: flex;
			width: 100%;
		}
		#textareas textarea {
			font-family: monospace;
			background-color: #000;
			color: white;
			border: 0;
			margin-bottom: 4px;
		}
		#textareas textarea:focus-visible {
			outline: 0;
			border-bottom: 4px solid lightblue;
			margin-bottom: 0;
		}
		#textareas textarea:nth-child(1) {
			border-right: 4px solid white;
			width: calc(50% - 2px);
			padding-left: 8px;
		}
		#textareas textarea:nth-child(2) {
			width: calc(50% + 2px);
			padding-right: 8px;
		}
		#cpu-status, #error {
			text-align: center;
		}
		a {
			color: #00C400;
		}
		a:hover {
			color: #00EC00;
		}
		a:active {
			color: #0F0;
		}
	</style>
</head>
<body>
	<div id="container">
		<h1 id="header">CPU Simulator</h1>
		<div id="textareas">
			<textarea name="assembly" id="assembly" rows="20"></textarea>
			<textarea name="memory" readonly id="memory" rows="20"></textarea>
		</div>
		<div class="padded" style="margin-top: 24px;">
			<div id="cpu-status"></div>
			<div id="error" style="color: red;"></div>
			<button id="assemble">Assemble</button>
			<button id="tick">Tick</button>
			<button id="reset" disabled>Reset</button>
			<button id="clear" disabled>Clear Memory</button>
		</div>
		<footer class="padded">
			Copyright © BalaM314, 2026. MIT License.
			<a href="https://github.com/BalaM314/cpu-sim/">Open source.</a>
		</footer>
	</div>
	<script type="module" src="./src/ui.js"></script>
</body>
</html>
